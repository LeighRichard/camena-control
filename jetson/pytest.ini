[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 忽略有问题的测试文件
addopts = 
    --ignore=tests/test_motion_properties.py
    --ignore=tests/test_vision_properties.py
    --ignore=tests/test_web_interface.py
    -v
    --tb=short

# Hypothesis 配置
hypothesis_profile = dev
